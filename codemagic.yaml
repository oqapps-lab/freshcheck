# ⚠️ DO NOT USE — builds are LOCAL-ONLY (eas build --local on the Mac).
# This file is kept as a historical reference of the signing setup only.
# The auto-trigger was REMOVED on 2026-05-31 so pushes to main no longer
# burn paid Codemagic CI minutes. See project CLAUDE.md "BUILDS: LOCAL ONLY".
workflows:
  ios-production:
    name: iOS Production
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "ios/FreshCheck.xcworkspace"
        XCODE_SCHEME: "FreshCheck"
        BUNDLE_ID: "com.gazetastreet.freshcheck"
        APP_STORE_APPLE_ID: 6767547114
        APP_STORE_CONNECT_KEY_IDENTIFIER: 787835NFD8
        APP_STORE_CONNECT_ISSUER_ID: 2f01e90d-40ee-4f1d-9a37-651713378b40
      node: v22.11.0
      cocoapods: default
      xcode: latest
    # triggering block intentionally removed — no auto-build on push.
    # (Was: events:[push], branch_patterns:[main]. Re-adding it would resume
    # burning paid CI minutes on every push, which is forbidden.)
    scripts:
      - name: Decode signing assets from env
        script: |
          mkdir -p ~/.cert
          echo "$CM_CERTIFICATE" | base64 --decode > ~/.cert/dist.p12
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ~/.cert/profile.mobileprovision
          ls -la ~/.cert/
      - name: Install npm dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean --no-install
      - name: Patch pbxproj — DEVELOPMENT_TEAM + Manual signing on FreshCheck target
        script: |
          # expo prebuild generates fresh pbxproj without DEVELOPMENT_TEAM. xcode-project use-profiles
          # does not inject it on Expo-style projects. Set it explicitly before signing.
          /usr/bin/python3 - <<'PY'
          import re
          p = '/Users/builder/clone/ios/FreshCheck.xcodeproj/project.pbxproj'
          src = open(p).read()
          for setting, value in [
              ('DEVELOPMENT_TEAM', '6Y6BFVDS4L'),
              ('CODE_SIGN_STYLE', 'Manual'),
          ]:
              if setting in src:
                  src = re.sub(rf'{setting} = [^;]+;', f'{setting} = {value};', src)
              else:
                  src = src.replace(
                      'PRODUCT_BUNDLE_IDENTIFIER = "com.gazetastreet.freshcheck";',
                      f'PRODUCT_BUNDLE_IDENTIFIER = "com.gazetastreet.freshcheck"; {setting} = {value};',
                  )
          open(p, 'w').write(src)
          print("pbxproj patched")
          PY
      - name: Pod install
        script: cd ios && pod install
      - name: Set up signing keychain
        script: |
          keychain initialize
          keychain add-certificates --certificate ~/.cert/dist.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles/"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i ~/.cert/profile.mobileprovision)")
          cp ~/.cert/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          xcode-project use-profiles --verbose
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios
          # get-latest-app-store-build-number returns only the live App Store version's max
          # (#36 here while TestFlight has up to #43), so the increment produced a duplicate
          # (#37) and ASC silently dropped the second upload. -testflight- returns the
          # absolute max across all TestFlight versions for the bundle.
          BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          NEW_NUMBER=$((BUILD_NUMBER + 1))
          echo "Latest TestFlight build=$BUILD_NUMBER; setting CFBundleVersion to $NEW_NUMBER"
          agvtool new-version -all $NEW_NUMBER
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
