<svg width="1284" height="2778" viewBox="0 0 1284 2778" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Match the in-app canvas exactly: #ECEFF4 (cool slate-tinted off-
         white) so the splash blends seamlessly into the first rendered
         frame instead of flashing a colour mismatch. -->
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ECEFF4"/>
      <stop offset="1" stop-color="#dde2eb"/>
    </linearGradient>
    <radialGradient id="halo1" cx="0.18" cy="0.22" r="0.55">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="0.86" cy="0.82" r="0.5">
      <stop offset="0" stop-color="#16a34a" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft drop shadow under the cushion disc, mimicking the
         neumorphic SoftSurface in-app. -->
    <filter id="cushionShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="14" dy="18" result="offsetblur"/>
      <feFlood flood-color="#94a3b8" flood-opacity="0.55"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1284" height="2778" fill="url(#canvas)"/>
  <rect width="1284" height="2778" fill="url(#halo1)"/>
  <rect width="1284" height="2778" fill="url(#halo2)"/>

  <!-- Cushion disc — same neumorphic raised-disc motif as the home
       scan-orb. Diameter = 360 px so it reads at iPad size too. -->
  <g filter="url(#cushionShadow)">
    <circle cx="642" cy="1330" r="220" fill="#FFFFFF"/>
  </g>
  <!-- Sprig centred in the disc -->
  <g transform="translate(642,1330) scale(18)" fill="none" stroke="#16a34a"
     stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 9C0 9 -8 5 -8 -3C-8 -5 -7 -8 -6 -8C-5 -8 -4 -6 -2 -5C0 -4 1 -2 1 0"/>
    <path d="M0 9C0 9 8 5 8 -3C8 -5 7 -8 6 -8C5 -8 4 -6 2 -5C0 -4 -1 -2 -1 0"/>
    <path d="M0 0V9"/>
  </g>
</svg>
